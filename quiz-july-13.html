<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily News Quiz — July 13, 2026</title>
<style>
  :root{
    --ink:#1c2733;
    --paper:#f7f4ec;
    --card:#ffffff;
    --global:#1d6fa5;
    --national:#b23a48;
    --jam:#7a4fbf;
    --correct:#2e7d4f;
    --wrong:#c0392b;
    --line:#e2ddd0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px 48px;
  }
  .wrap{width:100%;max-width:640px;}
  header{text-align:center;margin-bottom:20px;}
  header h1{font-size:2rem;letter-spacing:.5px;}
  header .date{
    font-style:italic;color:#6b6455;margin-top:4px;font-size:.95rem;
  }
  .progress{
    background:var(--line);height:8px;border-radius:4px;overflow:hidden;
    margin:18px 0 6px;
  }
  .progress .bar{
    height:100%;width:0;background:var(--ink);transition:width .35s ease;
  }
  .meta{
    display:flex;justify-content:space-between;font-size:.85rem;
    color:#6b6455;margin-bottom:16px;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:24px;box-shadow:0 2px 10px rgba(28,39,51,.06);
  }
  .badge{
    display:inline-block;font-family:Verdana,Arial,sans-serif;
    font-size:.68rem;font-weight:bold;letter-spacing:.08em;
    text-transform:uppercase;color:#fff;padding:4px 10px;
    border-radius:20px;margin-bottom:14px;
  }
  .badge.global{background:var(--global);}
  .badge.national{background:var(--national);}
  .badge.jam{background:var(--jam);}
  .question{font-size:1.15rem;line-height:1.5;margin-bottom:18px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    font-family:inherit;font-size:1rem;text-align:left;
    background:var(--paper);border:1px solid var(--line);
    border-radius:8px;padding:12px 14px;cursor:pointer;
    transition:border-color .15s, background .15s;line-height:1.4;
  }
  .opt:hover:not(:disabled){border-color:var(--ink);background:#fdfcf8;}
  .opt:disabled{cursor:default;}
  .opt.correct{
    background:#eaf5ee;border-color:var(--correct);
    color:var(--correct);font-weight:bold;
  }
  .opt.wrong{
    background:#fbeeec;border-color:var(--wrong);color:var(--wrong);
  }
  .explain{
    margin-top:16px;padding:14px;border-left:4px solid var(--ink);
    background:var(--paper);font-size:.95rem;line-height:1.55;
    border-radius:0 8px 8px 0;display:none;
  }
  .explain.show{display:block;}
  .next{
    display:none;margin-top:18px;width:100%;
    font-family:inherit;font-size:1.05rem;font-weight:bold;
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:13px;cursor:pointer;
  }
  .next.show{display:block;}
  .next:hover{background:#31404f;}
  .results{text-align:center;display:none;}
  .results.show{display:block;}
  .results .score{
    font-size:3.4rem;font-weight:bold;margin:10px 0 2px;
  }
  .results .outof{color:#6b6455;margin-bottom:14px;}
  .results .rank{
    font-size:1.4rem;font-weight:bold;margin-bottom:8px;
  }
  .results .flavor{
    font-style:italic;color:#524b3e;line-height:1.55;margin-bottom:22px;
  }
  .replay{
    font-family:inherit;font-size:1rem;font-weight:bold;
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:12px 26px;cursor:pointer;
  }
  .replay:hover{background:#31404f;}
  .coffee{
    display:inline-block;text-decoration:none;margin-top:14px;
    font-family:inherit;font-size:.95rem;font-weight:bold;
    color:var(--ink);background:#fdf3d7;border:1px solid #e8d9a8;
    border-radius:8px;padding:11px 22px;
  }
  .coffee:hover{background:#fbecc2;}
  footer{
    text-align:center;margin-top:26px;font-size:.8rem;
    color:#8a8272;font-style:italic;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>The Daily Ten</h1>
    <div class="date">Monday, July 13, 2026</div>
  </header>

  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="meta">
    <span id="qcount">Question 1 of 10</span>
    <span id="score">Score: 0</span>
  </div>

  <div class="card" id="quizCard">
    <span class="badge" id="badge"></span>
    <div class="question" id="qtext"></div>
    <div class="options" id="opts"></div>
    <div class="explain" id="explain"></div>
    <button class="next" id="nextBtn">Next Question →</button>
  </div>

  <div class="card results" id="results">
    <div style="font-size:1.1rem;color:#6b6455;">Final Edition</div>
    <div class="score" id="finalScore"></div>
    <div class="outof">out of 10</div>
    <div class="rank" id="rank"></div>
    <div class="flavor" id="flavor"></div>
    <button class="replay" onclick="location.reload()">Play Again</button>
    <div><a class="coffee" href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener">☕ Enjoyed it? Buy me a coffee</a></div>
  </div>

  <footer>The Daily Ten · Fresh questions every day · <a href="archive.html" style="color:#8a8272;">Archive</a> · <a href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener" style="color:#8a8272;">☕ Buy me a coffee</a></footer>
</div>

<script>
const QUESTIONS = [
  {
    cat:"global",
    q:"After a weekend in which the U.S. struck roughly 140 military targets in Iran, Tehran again declared which vital waterway closed?",
    options:["The Strait of Hormuz","The Suez Canal","The Strait of Malacca","The Bosphorus"],
    answer:"The Strait of Hormuz",
    explain:"Iran also fired on U.S. Gulf allies over the weekend, with missiles reported over Kuwait, Oman, Jordan, the UAE and Qatar — Jordan said it intercepted four. Oil prices climbed more than 3%, and peace talks in Qatar are near collapse amid Israeli intelligence reports that Iran has plotted to assassinate President Trump."
  },
  {
    cat:"global",
    q:"A massive overnight fire at a pub killed at least 27 people in which capital city?",
    options:["Bangkok","Manila","Jakarta","Hanoi"],
    answer:"Bangkok",
    explain:"Dozens more were injured in the blaze in the northern part of the Thai capital. Firefighters brought it under control early Monday as footage showed people fleeing the building through billows of black smoke. Investigators are still working to determine the cause."
  },
  {
    cat:"global",
    q:"At least two people were killed and several wounded in a weekend shooting at a street festival celebrating Latin culture in which city?",
    options:["Toronto","Montreal","Chicago","Miami"],
    answer:"Toronto",
    explain:"The shooting happened Saturday evening at the Salsa on St. Clair festival in Canada's largest city. Police responded to reports of an active shooter as the celebration was underway."
  },
  {
    cat:"global",
    q:"Julián Álvarez's 112th-minute strike sent which defending champion into the World Cup semifinals?",
    options:["Argentina","France","Brazil","Germany"],
    answer:"Argentina",
    explain:"Álvarez's long-range goal in extra time beat Switzerland in Kansas City. The semifinals are set: Spain vs. France on Tuesday in Arlington, Texas — neither team has lost all tournament — and Argentina vs. England, who beat Norway 2-1 behind a Jude Bellingham goal."
  },
  {
    cat:"global",
    q:"Typhoon Bavi weakened to a tropical storm Sunday but was still lashing parts of which country with strong winds and heavy rain?",
    options:["China","Japan","Philippines","India"],
    answer:"China",
    explain:"The storm continued to bring heavy rain to parts of China after weakening from typhoon strength over the weekend."
  },
  {
    cat:"national",
    q:"Sen. Lindsey Graham of South Carolina died Saturday at 71 — just after returning from his tenth trip to which country?",
    options:["Ukraine","Israel","Taiwan","Iraq"],
    answer:"Ukraine",
    explain:"Graham died of a ruptured aorta brought on by heart disease. The longtime foreign policy hawk was a staunch supporter of Ukraine, and President Zelenskyy called him a true defender of freedom. He was running for reelection in November, and one day before his death told CBS he was excited about progress on a bipartisan Russia sanctions bill."
  },
  {
    cat:"national",
    q:"As a dangerous heat dome spreads east across the country, Billings, Montana could hit what temperature for the first time in nearly a century?",
    options:["110 degrees","98 degrees","103 degrees","120 degrees"],
    answer:"110 degrees",
    explain:"Millions of Americans are under heat alerts. Salt Lake City is near its all-time high of 107, and the hot, humid air mass is forecast to reach the rest of the Midwest today and the East Coast on Tuesday."
  },
  {
    cat:"national",
    q:"Federal agents visited journalists' homes as the Justice Department subpoenaed reporters from which news outlet over its Air Force One reporting?",
    options:["The New York Times","The Washington Post","CNN","The Atlantic"],
    answer:"The New York Times",
    explain:"The subpoenas relate to the Times' reporting on Air Force One, in an escalation of the administration's pursuit of journalists' sources."
  },
  {
    cat:"national",
    q:"Disney's latest live-action remake topped the weekend box office. Which animated hit got the flesh-and-blood treatment this time?",
    options:["Moana","Frozen","Encanto","Tangled"],
    answer:"Moana",
    explain:"Dwayne \u201cThe Rock\u201d Johnson reprises his role as Maui, a character he voice-acted a decade ago in the 2016 animated original."
  },
  {
    cat:"jam",
    q:"This past week Phish played \u201cBouncing Around the Room,\u201d one of their earliest and most popular songs. What was different about this version?",
    options:["They type II'd that shit.","Mike played vibraphone","Trey used the megaphone","Page ate a sandwich"],
    answer:"They type II'd that shit.",
    explain:"After 497 near-identical versions, performance #498 — July 10 at Deer Creek — was the first-ever jammed-out \u201cBouncing.\u201d The band blew past the ending they'd hit in unison for 36 years and stretched the song to 14 minutes of Type II exploration, briefly fooling even lighting designer Chris Kuroda, who cut the lights at the usual final note."
  }
];

let current = 0;
let score = 0;

const badge = document.getElementById("badge");
const qtext = document.getElementById("qtext");
const opts = document.getElementById("opts");
const explain = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const bar = document.getElementById("bar");
const qcount = document.getElementById("qcount");
const scoreEl = document.getElementById("score");

const BADGES = {
  global:{label:"Global", cls:"global"},
  national:{label:"National", cls:"national"},
  jam:{label:"Bonus: Jam Band", cls:"jam"}
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function render(){
  const q = QUESTIONS[current];
  const b = BADGES[q.cat];
  badge.textContent = b.label;
  badge.className = "badge " + b.cls;
  qtext.textContent = q.q;
  explain.textContent = "";
  explain.classList.remove("show");
  nextBtn.classList.remove("show");
  opts.innerHTML = "";
  shuffle(q.options).forEach(optText=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = optText;
    btn.onclick = ()=>select(btn, optText, q);
    opts.appendChild(btn);
  });
  bar.style.width = ((current)/QUESTIONS.length*100) + "%";
  qcount.textContent = "Question " + (current+1) + " of " + QUESTIONS.length;
  scoreEl.textContent = "Score: " + score;
}

function select(btn, chosen, q){
  const buttons = opts.querySelectorAll(".opt");
  buttons.forEach(b=>{
    b.disabled = true;
    if(b.textContent === q.answer) b.classList.add("correct");
  });
  if(chosen === q.answer){
    score++;
  } else {
    btn.classList.add("wrong");
  }
  scoreEl.textContent = "Score: " + score;
  explain.textContent = q.explain;
  explain.classList.add("show");
  nextBtn.textContent = current === QUESTIONS.length-1 ? "See Results →" : "Next Question →";
  nextBtn.classList.add("show");
}

nextBtn.onclick = ()=>{
  current++;
  if(current < QUESTIONS.length){
    render();
  } else {
    showResults();
  }
};

function showResults(){
  document.getElementById("quizCard").style.display = "none";
  bar.style.width = "100%";
  qcount.textContent = "Complete";
  const r = document.getElementById("results");
  r.classList.add("show");
  document.getElementById("finalScore").textContent = score;
  let rank, flavor;
  if(score === 10){
    rank = "Front Page Legend";
    flavor = "A perfect ten. You read the news, you know your Type II jams, and frankly you should be writing this quiz.";
  } else if(score >= 8){
    rank = "Editor-in-Chief";
    flavor = "Sharp. You missed a beat or two, but the newsroom runs on your watch.";
  } else if(score >= 6){
    rank = "Beat Reporter";
    flavor = "Solid work. You've got the big stories down — now dig into the details.";
  } else if(score >= 4){
    rank = "Weekend Skimmer";
    flavor = "You caught the headlines between coffee refills. Tomorrow's edition awaits.";
  } else {
    rank = "Crossword-First Reader";
    flavor = "Hey, the puzzles are a legitimate reason to buy the paper. Come back tomorrow and redeem yourself.";
  }
  document.getElementById("rank").textContent = rank;
  document.getElementById("flavor").textContent = flavor;
}

render();
</script>
</body>
</html>
