<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Everyday.com — Archive</title>
<style>
  :root{
    --ink:#1c2733;
    --paper:#f7f4ec;
    --card:#ffffff;
    --line:#e2ddd0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px 48px;
  }
  .wrap{width:100%;max-width:640px;}
  header{text-align:center;margin-bottom:20px;}
  header h1{font-size:2rem;letter-spacing:.5px;}
  header .tagline{
    font-style:italic;color:#6b6455;margin-top:4px;font-size:.95rem;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:24px;box-shadow:0 2px 10px rgba(28,39,51,.06);
  }
  .edition{
    display:block;text-decoration:none;color:var(--ink);
    padding:16px 4px;border-bottom:1px solid var(--line);
    transition:background .15s;
  }
  .edition:last-child{border-bottom:none;}
  .edition:hover{background:var(--paper);}
  .edition .date{font-size:1.1rem;font-weight:bold;}
  .edition .teaser{
    font-style:italic;color:#6b6455;font-size:.9rem;margin-top:4px;
  }
  .back{
    display:block;text-align:center;margin-top:22px;
    color:#8a8272;font-size:.9rem;
  }
  footer{
    text-align:center;margin-top:26px;font-size:.8rem;
    color:#8a8272;font-style:italic;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>10Everyday.com</h1>
    <div class="tagline">Past Editions</div>
  </header>

  <div class="card">
    <!--
      HOW TO ADD A NEW EDITION:
      Copy the block below, paste it at the TOP of this list (newest first),
      and update three things:
        1. href="quiz-[month-day].html"  (the dated filename)
        2. The date text
        3. The teaser line (a hint about that day's bonus question)
    -->
    <a class="edition" href="quiz-july-14.html">
      <div class="date">Tuesday, July 14, 2026</div>
      <div class="teaser">Bonus: A run at "Deer Creek"</div>
    </a>
    <a class="edition" href="quiz-july-13.html">
      <div class="date">Monday, July 13, 2026</div>
      <div class="teaser">Bonus: Bouncing into uncharted territory</div>
    </a>
    <a class="edition" href="quiz-july-10.html">
      <div class="date">Friday, July 10, 2026</div>
      <div class="teaser">Bonus: The man behind Jerry's guitars</div>
    </a>
  </div>

  <a class="back" href="index.html">← Back to today's quiz</a>

  <footer>10Everyday.com · Fresh questions every weekday · <a href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener" style="color:#8a8272;">☕ Buy me a coffee</a></footer>
</div>
</body>
</html>
