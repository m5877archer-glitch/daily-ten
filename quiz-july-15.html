<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Everyday.com — July 15, 2026</title>
<style>
  :root{
    --ink:#1c2733;
    --paper:#f7f4ec;
    --card:#ffffff;
    --global:#1d6fa5;
    --national:#b23a48;
    --jam:#7a4fbf;
    --correct:#2e7d4f;
    --wrong:#c0392b;
    --line:#e2ddd0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px 48px;
  }
  .wrap{width:100%;max-width:640px;}
  header{text-align:center;margin-bottom:20px;}
  header h1{font-size:2rem;letter-spacing:.5px;}
  header .date{
    font-style:italic;color:#6b6455;margin-top:4px;font-size:.95rem;
  }
  .progress{
    background:var(--line);height:8px;border-radius:4px;overflow:hidden;
    margin:18px 0 6px;
  }
  .progress .bar{
    height:100%;width:0;background:var(--ink);transition:width .35s ease;
  }
  .meta{
    display:flex;justify-content:space-between;font-size:.85rem;
    color:#6b6455;margin-bottom:16px;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:24px;box-shadow:0 2px 10px rgba(28,39,51,.06);
  }
  .badge{
    display:inline-block;font-family:Verdana,Arial,sans-serif;
    font-size:.68rem;font-weight:bold;letter-spacing:.08em;
    text-transform:uppercase;color:#fff;padding:4px 10px;
    border-radius:20px;margin-bottom:14px;
  }
  .badge.global{background:var(--global);}
  .badge.national{background:var(--national);}
  .badge.jam{background:var(--jam);}
  .question{font-size:1.15rem;line-height:1.5;margin-bottom:18px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    font-family:inherit;font-size:1rem;text-align:left;
    background:var(--paper);border:1px solid var(--line);
    border-radius:8px;padding:12px 14px;cursor:pointer;
    transition:border-color .15s, background .15s;line-height:1.4;
  }
  .opt:hover:not(:disabled){border-color:var(--ink);background:#fdfcf8;}
  .opt:disabled{cursor:default;}
  .opt.correct{
    background:#eaf5ee;border-color:var(--correct);
    color:var(--correct);font-weight:bold;
  }
  .opt.wrong{
    background:#fbeeec;border-color:var(--wrong);color:var(--wrong);
  }
  .explain{
    margin-top:16px;padding:14px;border-left:4px solid var(--ink);
    background:var(--paper);font-size:.95rem;line-height:1.55;
    border-radius:0 8px 8px 0;display:none;
  }
  .explain.show{display:block;}
  .next{
    display:none;margin-top:18px;width:100%;
    font-family:inherit;font-size:1.05rem;font-weight:bold;
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:13px;cursor:pointer;
  }
  .next.show{display:block;}
  .next:hover{background:#31404f;}
  .results{text-align:center;display:none;}
  .results.show{display:block;}
  .results .score{
    font-size:3.4rem;font-weight:bold;margin:10px 0 2px;
  }
  .results .outof{color:#6b6455;margin-bottom:14px;}
  .results .rank{
    font-size:1.4rem;font-weight:bold;margin-bottom:8px;
  }
  .results .flavor{
    font-style:italic;color:#524b3e;line-height:1.55;margin-bottom:22px;
  }
  .coffee{
    display:inline-block;text-decoration:none;margin-top:14px;
    font-family:inherit;font-size:.95rem;font-weight:bold;
    color:var(--ink);background:#fdf3d7;border:1px solid #e8d9a8;
    border-radius:8px;padding:11px 22px;
  }
  .coffee:hover{background:#fbecc2;}
  .replay{
    font-family:inherit;font-size:1rem;font-weight:bold;
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:12px 26px;cursor:pointer;
  }
  .replay:hover{background:#31404f;}
  .share{
    font-family:inherit;font-size:1rem;font-weight:bold;
    background:#fff;color:var(--ink);border:2px solid var(--ink);
    border-radius:8px;padding:10px 26px;cursor:pointer;margin-left:10px;
  }
  .share:hover{background:var(--paper);}
  footer{
    text-align:center;margin-top:26px;font-size:.8rem;
    color:#8a8272;font-style:italic;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>10Everyday.com</h1>
    <div class="date">Wednesday, July 15, 2026</div>
  </header>

  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="meta">
    <span id="qcount">Question 1 of 10</span>
    <span id="score">Score: 0</span>
  </div>

  <div class="card" id="quizCard">
    <span class="badge" id="badge"></span>
    <div class="question" id="qtext"></div>
    <div class="options" id="opts"></div>
    <div class="explain" id="explain"></div>
    <button class="next" id="nextBtn">Next Question →</button>
  </div>

  <div class="card results" id="results">
    <div style="font-size:1.1rem;color:#6b6455;">Final Edition</div>
    <div class="score" id="finalScore"></div>
    <div class="outof">out of 10</div>
    <div class="rank" id="rank"></div>
    <div class="flavor" id="flavor"></div>
    <button class="replay" onclick="location.reload()">Play Again</button>
    <button class="share" id="shareBtn">Share My Score</button>
    <div><a class="coffee" href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener">☕ Enjoyed it? Buy me a coffee</a></div>
  </div>

  <footer>10Everyday.com · Fresh questions every weekday · <a href="archive.html" style="color:#8a8272;">Archive</a> · <a href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener" style="color:#8a8272;">☕ Buy me a coffee</a></footer>
</div>

<script>
const QUESTIONS = [
  {
    cat:"global",
    q:"Norway's World Cup run ended in the quarterfinals against England \u2014 but the team still got a heroes' welcome home. Roughly how many fans packed the Royal Palace grounds in Oslo to celebrate them?",
    options:["100,000","250","4 million","1,000"],
    answer:"100,000",
    explain:"An estimated 100,000 people filled the Royal Palace grounds to salute the squad after England ended their historic run 2-1 in the quarterfinals \u2014 Norway's deepest World Cup showing in a generation."
  },
  {
    cat:"global",
    q:"As fighting with Iran reignited, President Trump declared the U.S. will be known as \u201cTHE GUARDIAN OF THE HORMUZ STRAIT\u201d \u2014 and announced ships will pay what for safe passage?",
    options:["A 20% fee on all cargo","A flat $100 per boat","One barrel of oil per sailor","Nothing \u2014 passage is free"],
    answer:"A 20% fee on all cargo",
    explain:"The U.S. is reinstating a blockade on Iranian ports and charging a 20% fee on cargo shipped through the strait to cover security costs. Trump formally notified Congress that military action against Iran resumed last week, restarting the 60-day War Powers clock, as U.S. forces carried out a third straight night of strikes."
  },
  {
    cat:"global",
    q:"Iranian officials revealed that former president Mahmoud Ahmadinejad is now in Revolutionary Guard custody \u2014 after a failed plot by which country to install him as Iran's new leader?",
    options:["Israel","Switzerland","North Korea","Brazil"],
    answer:"Israel",
    explain:"According to four Iranian officials, Israel spent years secretly cultivating Ahmadinejad as a candidate to lead Iran, complete with covert meetings in Budapest and secret payments for his housing and travel. The plan collapsed \u2014 and Ahmadinejad is now being held by the IRGC's intelligence wing."
  },
  {
    cat:"global",
    q:"Actor Sam Neill, who died this week at 78, was best known for playing paleontologist Dr. Alan Grant in which blockbuster franchise?",
    options:["Jurassic Park","Star Wars","Indiana Jones","The Terminator"],
    answer:"Jurassic Park",
    explain:"Tributes poured in from Nicole Kidman, Cillian Murphy, and others for the beloved New Zealand actor. Fellow Kiwi actor Rima Te Wiata said Neill had been suffering from pneumonia."
  },
  {
    cat:"national",
    q:"Senators returned to the Capitol on Monday mourning which long-serving South Carolina Republican, who died suddenly over the weekend at age 71?",
    options:["Lindsey Graham","Tim Scott","Mitch McConnell","Rand Paul"],
    answer:"Lindsey Graham",
    explain:"Graham's office said he died Saturday night after a \u201cbrief and sudden illness\u201d \u2014 reports pointed to a torn aorta. He had just won his Republican primary in June, and tributes came in from U.S. and world leaders across the political spectrum."
  },
  {
    cat:"national",
    q:"A federal judge ruled Monday that President Trump and his family acted in \u201cbad faith\u201d by filing a $10 billion lawsuit against which government agency?",
    options:["The IRS","The Postal Service","NASA","The National Park Service"],
    answer:"The IRS",
    explain:"U.S. District Judge Kathleen Williams said the suit was filed for an \u201cimproper purpose\u201d in a scathing rebuke of the president, his attorneys, and the Justice Department. The lawsuit had led to a controversial May agreement that included a proposed $1.8 billion \u201canti-weaponization fund,\u201d later dropped after pushback from lawmakers in both parties."
  },
  {
    cat:"national",
    q:"President Trump's National Guard deployment in Washington, D.C. \u2014 already extended several times \u2014 is now set to last until when?",
    options:["Inauguration Day 2029","Labor Day","The next full moon","New Year's Eve"],
    answer:"Inauguration Day 2029",
    explain:"The deployment, which began as a temporary measure, has been repeatedly extended and is now scheduled to run through the end of Trump's term."
  },
  {
    cat:"national",
    q:"Trump signed an executive order shrinking two Utah national monuments \u2014 Bears Ears and Grand Staircase-Escalante \u2014 by more than what?",
    options:["90%","10%","25%","50%"],
    answer:"90%",
    explain:"The two monuments, considered sacred by Native Americans, span more than 3.2 million acres \u2014 nearly the size of Connecticut. Critics say the order opens thousands of acres of protected land to developers and the oil and gas industry."
  },
  {
    cat:"national",
    q:"A Tyrannosaurus rex fossil goes up for auction Tuesday. What's the dinosaur's nickname?",
    options:["Gus","Rexy","Bitey McBiteface","Gerald"],
    answer:"Gus",
    explain:"Gus follows a string of headline-grabbing dinosaur sales to the highest bidder \u2014 a practice that makes paleontologists wince, since privately sold specimens often disappear from scientific study."
  },
  {
    cat:"jam",
    q:"Norway lost the World Cup, but their success is noteworthy. What else is Norway noteworthy for?",
    options:["They are the most northern country in the world","They are the only country named after the water around the country","They brew their tea with last year's snowmelt for a drink called Ggnnatten","Their athletes are only allowed to train in the dark"],
    answer:"They are the only country named after the water around the country",
    explain:"Norway comes from the Old Norse nor\u00f0vegr \u2014 \u201cthe north way\u201d \u2014 the sheltered coastal sailing route through the waters hugging its shore. In other words, the country is named for the waterway around it rather than the land itself."
  }
];

let current = 0;
let score = 0;

const badge = document.getElementById("badge");
const qtext = document.getElementById("qtext");
const opts = document.getElementById("opts");
const explain = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const bar = document.getElementById("bar");
const qcount = document.getElementById("qcount");
const scoreEl = document.getElementById("score");

const BADGES = {
  global:{label:"Global", cls:"global"},
  national:{label:"National", cls:"national"},
  jam:{label:"Bonus", cls:"jam"}
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function render(){
  const q = QUESTIONS[current];
  const b = BADGES[q.cat];
  badge.textContent = b.label;
  badge.className = "badge " + b.cls;
  qtext.textContent = q.q;
  explain.textContent = "";
  explain.classList.remove("show");
  nextBtn.classList.remove("show");
  opts.innerHTML = "";
  shuffle(q.options).forEach(optText=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = optText;
    btn.onclick = ()=>select(btn, optText, q);
    opts.appendChild(btn);
  });
  bar.style.width = ((current)/QUESTIONS.length*100) + "%";
  qcount.textContent = "Question " + (current+1) + " of " + QUESTIONS.length;
  scoreEl.textContent = "Score: " + score;
}

function select(btn, chosen, q){
  const buttons = opts.querySelectorAll(".opt");
  buttons.forEach(b=>{
    b.disabled = true;
    if(b.textContent === q.answer) b.classList.add("correct");
  });
  if(chosen === q.answer){
    score++;
  } else {
    btn.classList.add("wrong");
  }
  scoreEl.textContent = "Score: " + score;
  explain.textContent = q.explain;
  explain.classList.add("show");
  nextBtn.textContent = current === QUESTIONS.length-1 ? "See Results →" : "Next Question →";
  nextBtn.classList.add("show");
}

nextBtn.onclick = ()=>{
  current++;
  if(current < QUESTIONS.length){
    render();
  } else {
    showResults();
  }
};

function showResults(){
  document.getElementById("quizCard").style.display = "none";
  bar.style.width = "100%";
  qcount.textContent = "Complete";
  const r = document.getElementById("results");
  r.classList.add("show");
  document.getElementById("finalScore").textContent = score;
  let rank, flavor;
  if(score === 10){
    rank = "Front Page Legend";
    flavor = "A perfect ten. You read the news, you know your fjords, and frankly you should be writing this quiz.";
  } else if(score >= 8){
    rank = "Editor-in-Chief";
    flavor = "Sharp. You missed a beat or two, but the newsroom runs on your watch.";
  } else if(score >= 6){
    rank = "Beat Reporter";
    flavor = "Solid work. You've got the big stories down — now dig into the details.";
  } else if(score >= 4){
    rank = "Weekend Skimmer";
    flavor = "You caught the headlines between coffee refills. Tomorrow's edition awaits.";
  } else {
    rank = "Crossword-First Reader";
    flavor = "Hey, the puzzles are a legitimate reason to buy the paper. Come back tomorrow and redeem yourself.";
  }
  document.getElementById("rank").textContent = rank;
  document.getElementById("flavor").textContent = flavor;

  const shareBtn = document.getElementById("shareBtn");
  const shareText = "I scored " + score + "/10 on today's 10Everyday.com news quiz \u2014 rank: " + rank + ". Think you can beat me? https://10everyday.com";
  shareBtn.onclick = async () => {
    if (navigator.share) {
      try { await navigator.share({ text: shareText }); } catch(e) {}
    } else {
      try {
        await navigator.clipboard.writeText(shareText);
        shareBtn.textContent = "Copied! Paste it anywhere";
        setTimeout(()=>{ shareBtn.textContent = "Share My Score"; }, 2500);
      } catch(e) {
        prompt("Copy your score:", shareText);
      }
    }
  };
}

render();
</script>

</body>
</html>
