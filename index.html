<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Everyday.com — July 14, 2026</title>
<style>
  :root{
    --ink:#1c2733;
    --paper:#f7f4ec;
    --card:#ffffff;
    --global:#1d6fa5;
    --national:#b23a48;
    --jam:#7a4fbf;
    --correct:#2e7d4f;
    --wrong:#c0392b;
    --line:#e2ddd0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px 48px;
  }
  .wrap{width:100%;max-width:640px;}
  header{text-align:center;margin-bottom:20px;}
  header h1{font-size:2rem;letter-spacing:.5px;}
  header .date{
    font-style:italic;color:#6b6455;margin-top:4px;font-size:.95rem;
  }
  .progress{
    background:var(--line);height:8px;border-radius:4px;overflow:hidden;
    margin:18px 0 6px;
  }
  .progress .bar{
    height:100%;width:0;background:var(--ink);transition:width .35s ease;
  }
  .meta{
    display:flex;justify-content:space-between;font-size:.85rem;
    color:#6b6455;margin-bottom:16px;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:24px;box-shadow:0 2px 10px rgba(28,39,51,.06);
  }
  .badge{
    display:inline-block;font-family:Verdana,Arial,sans-serif;
    font-size:.68rem;font-weight:bold;letter-spacing:.08em;
    text-transform:uppercase;color:#fff;padding:4px 10px;
    border-radius:20px;margin-bottom:14px;
  }
  .badge.global{background:var(--global);}
  .badge.national{background:var(--national);}
  .badge.jam{background:var(--jam);}
  .question{font-size:1.15rem;line-height:1.5;margin-bottom:18px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    font-family:inherit;font-size:1rem;text-align:left;
    background:var(--paper);border:1px solid var(--line);
    border-radius:8px;padding:12px 14px;cursor:pointer;
    transition:border-color .15s, background .15s;line-height:1.4;
  }
  .opt:hover:not(:disabled){border-color:var(--ink);background:#fdfcf8;}
  .opt:disabled{cursor:default;}
  .opt.correct{
    background:#eaf5ee;border-color:var(--correct);
    color:var(--correct);font-weight:bold;
  }
  .opt.wrong{
    background:#fbeeec;border-color:var(--wrong);color:var(--wrong);
  }
  .explain{
    margin-top:16px;padding:14px;border-left:4px solid var(--ink);
    background:var(--paper);font-size:.95rem;line-height:1.55;
    border-radius:0 8px 8px 0;display:none;
  }
  .explain.show{display:block;}
  .next{
    display:none;margin-top:18px;width:100%;
    font-family:inherit;font-size:1.05rem;font-weight:bold;
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:13px;cursor:pointer;
  }
  .next.show{display:block;}
  .next:hover{background:#31404f;}
  .results{text-align:center;display:none;}
  .results.show{display:block;}
  .results .score{
    font-size:3.4rem;font-weight:bold;margin:10px 0 2px;
  }
  .results .outof{color:#6b6455;margin-bottom:14px;}
  .results .rank{
    font-size:1.4rem;font-weight:bold;margin-bottom:8px;
  }
  .results .flavor{
    font-style:italic;color:#524b3e;line-height:1.55;margin-bottom:22px;
  }
  .coffee{
    display:inline-block;text-decoration:none;margin-top:14px;
    font-family:inherit;font-size:.95rem;font-weight:bold;
    color:var(--ink);background:#fdf3d7;border:1px solid #e8d9a8;
    border-radius:8px;padding:11px 22px;
  }
  .coffee:hover{background:#fbecc2;}
  .replay{
    font-family:inherit;font-size:1rem;font-weight:bold;
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:12px 26px;cursor:pointer;
  }
  .replay:hover{background:#31404f;}
  footer{
    text-align:center;margin-top:26px;font-size:.8rem;
    color:#8a8272;font-style:italic;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>10Everyday.com</h1>
    <div class="date">Tuesday, July 14, 2026</div>
  </header>

  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="meta">
    <span id="qcount">Question 1 of 10</span>
    <span id="score">Score: 0</span>
  </div>

  <div class="card" id="quizCard">
    <span class="badge" id="badge"></span>
    <div class="question" id="qtext"></div>
    <div class="options" id="opts"></div>
    <div class="explain" id="explain"></div>
    <button class="next" id="nextBtn">Next Question →</button>
  </div>

  <div class="card results" id="results">
    <div style="font-size:1.1rem;color:#6b6455;">Final Edition</div>
    <div class="score" id="finalScore"></div>
    <div class="outof">out of 10</div>
    <div class="rank" id="rank"></div>
    <div class="flavor" id="flavor"></div>
    <button class="replay" onclick="location.reload()">Play Again</button>
    <div><a class="coffee" href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener">☕ Enjoyed it? Buy me a coffee</a></div>
  </div>

  <footer>10Everyday.com · Fresh questions every weekday · <a href="archive.html" style="color:#8a8272;">Archive</a> · <a href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener" style="color:#8a8272;">☕ Buy me a coffee</a></footer>
</div>

<script>
const QUESTIONS = [
  {
    cat:"national",
    q:"Democratic Rep. Ro Khanna said he was detained for over an hour during a West Bank tour by armed Israeli settlers carrying what U.S.-made weapon?",
    options:["M4 rifles","Stinger missiles","M1 tanks","Grenade launchers"],
    answer:"M4 rifles",
    explain:"Khanna, who is weighing a 2028 presidential run, said settlers wielding American-made M4 rifles blocked his delegation's van near the ruins of Khirbet Zanuta, and that Israeli soldiers who arrived sided with the settlers rather than freeing his group. The IDF denied detaining anyone. Netanyahu responded that Israel is \u201ca nation of laws.\u201d"
  },
  {
    cat:"national",
    q:"The Justice Department escalated its pursuit of journalists' sources this weekend, sending federal agents to reporters' homes and subpoenaing which newspaper over its Air Force One reporting?",
    options:["The New York Times","The Wall Street Journal","The Washington Post","USA Today"],
    answer:"The New York Times",
    explain:"The subpoenas targeted Times reporters over their coverage of Air Force One, part of a broader administration effort to identify leakers. Press-freedom groups condemned the move as an intimidation tactic."
  },
  {
    cat:"global",
    q:"Europe's record-breaking heat wave, now shifting east toward the Balkans and Ukraine, has driven the continent's excess-death toll past what grim milestone since June 21?",
    options:["10,000 deaths","500 deaths","1 million deaths","100 deaths"],
    answer:"10,000 deaths",
    explain:"The WHO first reported more than 1,300 excess deaths in late June; by mid-July the toll had climbed past 10,000 as the heat persisted. Scientists say fossil-fuel-driven warming has made these European heat waves dramatically more intense. Berlin police even deployed water cannons to help residents cool off."
  },
  {
    cat:"global",
    q:"Germany announced it will fund the production of how many drones for Ukraine, a major boost to Kyiv's defenses heading into winter?",
    options:["50,000","500","5 million","50"],
    answer:"50,000",
    explain:"The pledge is part of a broader European push to shore up Ukraine as U.S. support wavers. It came the same week President Zelenskyy carried out a government reshuffle aimed at steadying the country through another difficult winter of the war."
  },
  {
    cat:"global",
    q:"Israel set an October vote that will effectively serve as a referendum on the leadership of which long-serving prime minister?",
    options:["Benjamin Netanyahu","Naftali Bennett","Yair Lapid","Isaac Herzog"],
    answer:"Benjamin Netanyahu",
    explain:"The October ballot puts Netanyahu's grip on power to the test amid ongoing fallout from the Gaza war and mounting domestic criticism of his government's handling of both the conflict and a wave of settler violence in the West Bank."
  },
  {
    cat:"global",
    q:"The World Cup semifinals are set. Which two undefeated European sides meet Tuesday in Arlington, Texas?",
    options:["Spain vs. France","Germany vs. Italy","England vs. Portugal","Netherlands vs. Belgium"],
    answer:"Spain vs. France",
    explain:"Neither Spain nor France had lost a match all tournament heading into the semifinal. The other semi pits Argentina \u2014 the defending champions \u2014 against England, who advanced past Norway 2-1 behind a Jude Bellingham goal."
  },
  {
    cat:"global",
    q:"Typhoon Bavi forced the mass evacuation of coastal residents in which country before weakening to a tropical storm?",
    options:["China","Japan","Vietnam","Philippines"],
    answer:"China",
    explain:"Authorities relocated large numbers of people from low-lying coastal areas as the storm approached. Bavi later weakened but still dumped heavy rain across the region."
  },
  {
    cat:"global",
    q:"Scientists warned this week that the coming 2026-27 cycle has a historically unprecedented chance of becoming what climate pattern?",
    options:["El Ni\u00f1o","A new ice age","A permanent monsoon","La Ni\u00f1a"],
    answer:"El Ni\u00f1o",
    explain:"Forecasters flagged an unusually high probability of El Ni\u00f1o conditions developing. Combined with disruptions from the Iran conflict, analysts warned the pattern could threaten a global food-price shock."
  },
  {
    cat:"national",
    q:"Disney's live-action remake that topped the weekend box office opened to a soft $43 million \u2014 disappointing against a budget of roughly what?",
    options:["A quarter of a billion dollars","$5 million","$2 billion","$50 million"],
    answer:"A quarter of a billion dollars",
    explain:"The live-action Moana \u2014 with Dwayne \u201cThe Rock\u201d Johnson reprising Maui \u2014 cost around $250 million before marketing, making its $43 million debut a letdown for the studio despite finishing first for the weekend."
  },
  {
    cat:"jam",
    q:"Phish just wrapped a three-night run at a famous amphitheater outside Indianapolis, Indiana \u2014 neighbor to the infamous \u201cclose-by campground.\u201d This venue was formerly known as what?",
    options:["The Indy 500 Racetrack and Smorgasbord","The Lemonade Stand","Deer Creek","Beer Creek"],
    answer:"Deer Creek",
    explain:"Now called Ruoff Music Center, the Noblesville amphitheater opened in 1989 as Deer Creek Music Center \u2014 and nostalgic heads still call it Deer Creek. The Grateful Dead played there 14 times, including the infamous July 1995 show where thousands of fence-crashers forced the next night's cancellation."
  }
];

let current = 0;
let score = 0;

const badge = document.getElementById("badge");
const qtext = document.getElementById("qtext");
const opts = document.getElementById("opts");
const explain = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const bar = document.getElementById("bar");
const qcount = document.getElementById("qcount");
const scoreEl = document.getElementById("score");

const BADGES = {
  global:{label:"Global", cls:"global"},
  national:{label:"National", cls:"national"},
  jam:{label:"Bonus", cls:"jam"}
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function render(){
  const q = QUESTIONS[current];
  const b = BADGES[q.cat];
  badge.textContent = b.label;
  badge.className = "badge " + b.cls;
  qtext.textContent = q.q;
  explain.textContent = "";
  explain.classList.remove("show");
  nextBtn.classList.remove("show");
  opts.innerHTML = "";
  shuffle(q.options).forEach(optText=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = optText;
    btn.onclick = ()=>select(btn, optText, q);
    opts.appendChild(btn);
  });
  bar.style.width = ((current)/QUESTIONS.length*100) + "%";
  qcount.textContent = "Question " + (current+1) + " of " + QUESTIONS.length;
  scoreEl.textContent = "Score: " + score;
}

function select(btn, chosen, q){
  const buttons = opts.querySelectorAll(".opt");
  buttons.forEach(b=>{
    b.disabled = true;
    if(b.textContent === q.answer) b.classList.add("correct");
  });
  if(chosen === q.answer){
    score++;
  } else {
    btn.classList.add("wrong");
  }
  scoreEl.textContent = "Score: " + score;
  explain.textContent = q.explain;
  explain.classList.add("show");
  nextBtn.textContent = current === QUESTIONS.length-1 ? "See Results →" : "Next Question →";
  nextBtn.classList.add("show");
}

nextBtn.onclick = ()=>{
  current++;
  if(current < QUESTIONS.length){
    render();
  } else {
    showResults();
  }
};

function showResults(){
  document.getElementById("quizCard").style.display = "none";
  bar.style.width = "100%";
  qcount.textContent = "Complete";
  const r = document.getElementById("results");
  r.classList.add("show");
  document.getElementById("finalScore").textContent = score;
  let rank, flavor;
  if(score === 10){
    rank = "Front Page Legend";
    flavor = "A perfect ten. You read the news, you know your stuff, and frankly you should be writing this quiz.";
  } else if(score >= 8){
    rank = "Editor-in-Chief";
    flavor = "Sharp. You missed a beat or two, but the newsroom runs on your watch.";
  } else if(score >= 6){
    rank = "Beat Reporter";
    flavor = "Solid work. You've got the big stories down — now dig into the details.";
  } else if(score >= 4){
    rank = "Weekend Skimmer";
    flavor = "You caught the headlines between coffee refills. Tomorrow's edition awaits.";
  } else {
    rank = "Crossword-First Reader";
    flavor = "Hey, the puzzles are a legitimate reason to buy the paper. Come back tomorrow and redeem yourself.";
  }
  document.getElementById("rank").textContent = rank;
  document.getElementById("flavor").textContent = flavor;
}

render();
</script>
</body>
</html>
