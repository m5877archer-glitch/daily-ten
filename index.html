<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Everyday.com — July 17, 2026</title>
<style>
  :root{
    --ink:#1c2733;
    --paper:#f7f4ec;
    --card:#fffdf7;
    --pt:#5b8c5b;
    --ptdark:#1e3a1e;
    --ptmid:#4a7c4a;
    --ptrow:#ffffcc;
    --global:#1d6fa5;
    --national:#b23a48;
    --jam:#7a4fbf;
    --correct:#2e7d4f;
    --wrong:#c0392b;
    --line:#d8d2c0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--pt);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px 48px;
  }
  .page{
    background:var(--paper);border:1px solid var(--ptdark);
    padding:26px 22px 20px;box-shadow:0 3px 14px rgba(20,40,20,.35);
  }
  .wrap{width:100%;max-width:640px;}
  header{text-align:center;margin-bottom:14px;}
  header .kicker{
    font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:#6b6455;
  }
  header h1{font-size:clamp(1.55rem,8.5vw,2.5rem);letter-spacing:.02em;margin:2px 0;}
  header h1 .dot{color:var(--national);}
  header .tagline{
    font-style:italic;color:#524b3e;font-size:.9rem;
    border-bottom:3px double var(--ink);padding-bottom:12px;
  }
  header .dateline{
    display:flex;justify-content:space-between;gap:8px;
    border-bottom:1px solid var(--ink);padding:6px 2px;
    font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:#524b3e;
  }
  header .dateline .dl-date{font-weight:bold;}
  .progress{
    background:#e6e1d2;height:8px;overflow:hidden;
    margin:16px 0 6px;border:1px solid var(--line);
  }
  .progress .bar{
    height:100%;width:0;background:var(--ptmid);transition:width .35s ease;
  }
  .meta{
    display:flex;justify-content:space-between;font-size:.85rem;
    font-weight:bold;color:#fff;background:var(--ptmid);
    border:1px solid var(--ptdark);padding:7px 12px;margin-bottom:14px;
  }
  .card{
    background:var(--card);border:1px solid var(--line);
    padding:22px;
  }
  .badge{
    display:inline-block;font-family:Verdana,Arial,sans-serif;
    font-size:.68rem;font-weight:bold;letter-spacing:.08em;
    text-transform:uppercase;color:#fff;padding:4px 10px;
    margin-bottom:14px;
  }
  .badge.global{background:var(--global);}
  .badge.national{background:var(--national);}
  .badge.jam{background:var(--jam);}
  .question{font-size:1.15rem;line-height:1.55;margin-bottom:18px;}
  .question::first-letter{
    float:left;font-size:3.1rem;line-height:.82;font-weight:bold;
    padding:4px 8px 0 0;
  }
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    font-family:inherit;font-size:1rem;text-align:left;
    background:#fffdf7;border:1px solid var(--line);
    padding:12px 14px;cursor:pointer;
    transition:border-color .15s, background .15s;line-height:1.4;
  }
  .opt:nth-child(even){background:var(--ptrow);}
  .opt:hover:not(:disabled){border-color:var(--ptmid);border-width:1px;outline:1px solid var(--ptmid);}
  .opt:disabled{cursor:default;}
  .opt.correct{
    background:#eaf5ee;border-color:var(--correct);
    color:var(--correct);font-weight:bold;
  }
  .opt.wrong{
    background:#fbeeec;border-color:var(--wrong);color:var(--wrong);
  }
  .explain{
    margin-top:16px;padding:14px;border-left:4px solid var(--ptmid);
    background:var(--paper);font-size:.95rem;line-height:1.55;
    display:none;
  }
  .explain.show{display:block;}
  .next{
    display:none;margin-top:18px;width:100%;
    font-family:inherit;font-size:1.05rem;font-weight:bold;
    background:var(--ptmid);color:#fff;border:1px solid var(--ptdark);
    padding:13px;cursor:pointer;
  }
  .next.show{display:block;}
  .next:hover{background:var(--ptdark);}
  .results{text-align:center;display:none;}
  .results.show{display:block;}
  .results .score{
    font-size:3.4rem;font-weight:bold;margin:10px 0 2px;
  }
  .results .outof{color:#6b6455;margin-bottom:14px;}
  .results .rank{
    font-size:1.4rem;font-weight:bold;margin-bottom:8px;
  }
  .results .flavor{
    font-style:italic;color:#524b3e;line-height:1.55;margin-bottom:22px;
  }
  .coffee{
    display:inline-block;text-decoration:none;margin-top:14px;
    font-family:inherit;font-size:.95rem;font-weight:bold;
    color:var(--ink);background:#fdf3d7;border:1px solid #e8d9a8;
    padding:11px 22px;
  }
  .coffee:hover{background:#fbecc2;}
  .replay{
    font-family:inherit;font-size:1rem;font-weight:bold;
    background:var(--ptmid);color:#fff;border:1px solid var(--ptdark);
    padding:12px 26px;cursor:pointer;
  }
  .replay:hover{background:var(--ptdark);}
  .share{
    font-family:inherit;font-size:1rem;font-weight:bold;
    background:transparent;color:var(--ptmid);border:2px solid var(--ptmid);
    padding:10px 26px;cursor:pointer;margin-left:10px;
  }
  .share:hover{background:var(--ptrow);}
  footer{
    text-align:center;margin-top:18px;padding-top:8px;
    border-top:3px double var(--ink);
    font-size:.8rem;color:#8a8272;font-style:italic;
  }
</style>
</head>
<body>
<div class="wrap">
 <div class="page">
  <header>
    <div class="kicker">Est. 2026 &middot; Free every weekday</div>
    <h1>10Everyday<span class="dot">.</span>com</h1>
    <div class="tagline">Ten questions. Three minutes. No paywall.</div>
    <div class="dateline">
      <span>Vol. I, No. 6</span>
      <span class="dl-date">Friday, July 17, 2026</span>
      <span>Morning edition</span>
    </div>
  </header>

  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="meta">
    <span id="qcount">Question 1 of 10</span>
    <span id="score">Score: 0</span>
  </div>

  <div class="card" id="quizCard">
    <span class="badge" id="badge"></span>
    <div class="question" id="qtext"></div>
    <div class="options" id="opts"></div>
    <div class="explain" id="explain"></div>
    <button class="next" id="nextBtn">Next Question →</button>
  </div>

  <div class="card results" id="results">
    <div style="font-size:1.1rem;color:#6b6455;">Final Edition</div>
    <div class="score" id="finalScore"></div>
    <div class="outof">out of 10</div>
    <div class="rank" id="rank"></div>
    <div class="flavor" id="flavor"></div>
    <button class="replay" onclick="location.reload()">Play Again</button>
    <button class="share" id="shareBtn">Share My Score</button>
    <div><a class="coffee" href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener">☕ Enjoyed it? Buy me a coffee</a></div>
  </div>

  <footer>10Everyday.com · Fresh questions every weekday · <a href="archive.html" style="color:#8a8272;">Archive</a> · <a href="https://buymeacoffee.com/10everyday" target="_blank" rel="noopener" style="color:#8a8272;">☕ Buy me a coffee</a></footer>
 </div>
</div>

<script>
const QUESTIONS = [
  {
    cat:"global",
    q:"This year's Tour de France opened in Barcelona with a team time trial — the first opening TTT since 1971. But the format came with a twist never before used in Tour history. What was it?",
    options:["Every rider was timed individually, instead of the team taking one collective time","Teams rode tandem bicycles","The stage was held entirely at night","Riders were not allowed to draft off teammates"],
    answer:"Every rider was timed individually, instead of the team taking one collective time",
    explain:"In a traditional team time trial, the whole squad gets the time of its fourth or fifth rider across the line. In Barcelona, the team still won the stage together — but each rider's individual time counted toward the general classification, meaning a star who got dropped on the Montjuïc climbs lost real seconds. It made for a tense finale, with Visma-Lease a Bike sweeping to the stage win."
  },
  {
    cat:"global",
    q:"In Colombia's razor-tight presidential runoff, a Trump-backed candidate celebrated winning the preliminary count. Which direction would he take the country?",
    options:["Far-right populism","Communist revolution","A return to military junta rule","Absolute monarchy"],
    answer:"Far-right populism",
    explain:"Far-right populist Abelardo de la Espriella, backed by President Trump, celebrated winning the preliminary count in the razor-tight runoff — a dramatic swing for a country that elected leftist Gustavo Petro just four years earlier."
  },
  {
    cat:"global",
    q:"A succession debate is intensifying in Japan, where the monarchy is quite literally running out of heirs. What rule is at the center of the controversy?",
    options:["Women cannot become emperor","The emperor must be over 60","Heirs must be born in Tokyo","The emperor cannot marry a commoner"],
    answer:"Women cannot become emperor",
    explain:"Japan's imperial family is running short of eligible male heirs, reviving debate over the law that bars women from taking the Chrysanthemum Throne — a rule polls show most Japanese would happily scrap."
  },
  {
    cat:"global",
    q:"China reported new economic data this week showing growth well below the 5% pace it clocked earlier in the year — despite a surge in exports driven partly by a boom in what?",
    options:["Artificial intelligence","Cruise ship tourism","Olive oil","Luxury watches"],
    answer:"Artificial intelligence",
    explain:"Official data showed the economy cooling sharply from its strong 5% January-March pace, even as an AI-driven boom powered a surge in exports."
  },
  {
    cat:"global",
    q:"SETI scientists finished scanning 3I/ATLAS — only the third interstellar object ever detected passing through our solar system — for radio signals. What did they find?",
    options:["Nothing beyond human-made interference","A repeating mathematical pattern","Faint signals matching an old NASA probe","A magnetic field like Earth's"],
    answer:"Nothing beyond human-made interference",
    explain:"The rapid-response search found no radio signals suggesting alien technology — just human-made interference — helping confirm the object's natural origin and rehearsing the playbook for the next interstellar visitor."
  },
  {
    cat:"national",
    q:"NASA just awarded nearly $600 million in contracts for four commercial missions planned for late 2028. Where are they headed?",
    options:["The Moon","Mars","Venus","The International Space Station"],
    answer:"The Moon",
    explain:"The four commercial Moon landings will each carry the same trio of science instruments to improve lunar navigation, study the dangerous dust kicked up during landings, and map the Moon's radiation environment."
  },
  {
    cat:"national",
    q:"President Trump's nominee for Director of National Intelligence, Jay Clayton, frustrated Democratic senators at his confirmation hearing this week by refusing to answer what question?",
    options:["Who won the 2020 election","Whether the Earth is round","How many states are in the U.S.","Whether he's ever been to Russia"],
    answer:"Who won the 2020 election",
    explain:"Clayton declined to say whether Joe Biden won the 2020 election, prompting Sen. Mark Kelly to complain that nominees 'just fundamentally refuse to disagree with things that the president says.'"
  },
  {
    cat:"national",
    q:"A new sleep study found that cutting nightly sleep by just 80 minutes for six weeks caused participants to do what?",
    options:["Gain weight and spend more time inactive","Develop perfect pitch","Sleepwalk twice as often","Dream exclusively in black and white"],
    answer:"Gain weight and spend more time inactive",
    explain:"Even mild, realistic sleep loss — similar to what many adults live with — produced measurable weight gain and more inactivity in six weeks. Researchers warn the health toll could compound over months or years."
  },
  {
    cat:"national",
    q:"Baseball returns from the All-Star break tonight with a marquee series at Yankee Stadium. Who's in town to face the Yankees?",
    options:["The Los Angeles Dodgers","The Boston Red Sox","The Philadelphia Phillies","The Houston Astros"],
    answer:"The Los Angeles Dodgers",
    explain:"The Dodgers open a weekend set in the Bronx tonight — a rematch of the 2024 World Series, and the biggest series of the season's unofficial second-half opener."
  },
  {
    cat:"jam",
    q:"In 1993, Phish played at Wolf Trap in Vienna, Virginia, starting a long tradition of great shows in the Old Dominion State. Besides being able to bring in picnic style food and beverage to the venue, what else is special about Wolf Trap?",
    options:["It's built on the remains of an 18th century steel mill","It was part of the underground railroad","It's the only national park dedicated to the performing arts","It is only open when the humidity and temperature create a spa-like steam room atmosphere"],
    answer:"It's the only national park dedicated to the performing arts",
    explain:"Phish's one and only Wolf Trap show happened 33 years ago today — July 17, 1993 — at the Filene Center, an intimate wooden amphitheater where fans could carry in picnic baskets and wine. Wolf Trap holds the distinction of being the first (and still only) national park for the performing arts."
  }
];

let current = 0;
let score = 0;

const badge = document.getElementById("badge");
const qtext = document.getElementById("qtext");
const opts = document.getElementById("opts");
const explain = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const bar = document.getElementById("bar");
const qcount = document.getElementById("qcount");
const scoreEl = document.getElementById("score");

const BADGES = {
  global:{label:"Global", cls:"global"},
  national:{label:"National", cls:"national"},
  jam:{label:"Bonus", cls:"jam"}
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function render(){
  const q = QUESTIONS[current];
  const b = BADGES[q.cat];
  badge.textContent = b.label;
  badge.className = "badge " + b.cls;
  qtext.textContent = q.q;
  explain.textContent = "";
  explain.classList.remove("show");
  nextBtn.classList.remove("show");
  opts.innerHTML = "";
  shuffle(q.options).forEach(optText=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = optText;
    btn.onclick = ()=>select(btn, optText, q);
    opts.appendChild(btn);
  });
  bar.style.width = ((current)/QUESTIONS.length*100) + "%";
  qcount.textContent = "Question " + (current+1) + " of " + QUESTIONS.length;
  scoreEl.textContent = "Score: " + score;
}

function select(btn, chosen, q){
  const buttons = opts.querySelectorAll(".opt");
  buttons.forEach(b=>{
    b.disabled = true;
    if(b.textContent === q.answer) b.classList.add("correct");
  });
  if(chosen === q.answer){
    score++;
  } else {
    btn.classList.add("wrong");
  }
  scoreEl.textContent = "Score: " + score;
  explain.textContent = q.explain;
  explain.classList.add("show");
  nextBtn.textContent = current === QUESTIONS.length-1 ? "See Results →" : "Next Question →";
  nextBtn.classList.add("show");
}

nextBtn.onclick = ()=>{
  current++;
  if(current < QUESTIONS.length){
    render();
  } else {
    showResults();
  }
};

function showResults(){
  document.getElementById("quizCard").style.display = "none";
  bar.style.width = "100%";
  qcount.textContent = "Complete";
  const r = document.getElementById("results");
  r.classList.add("show");
  document.getElementById("finalScore").textContent = score;
  let rank, flavor;
  if(score === 10){
    rank = "Front Page Legend";
    flavor = "A perfect ten. You read the news, you know your national parks, and frankly you should be writing this quiz.";
  } else if(score >= 8){
    rank = "Editor-in-Chief";
    flavor = "Sharp. You missed a beat or two, but the newsroom runs on your watch.";
  } else if(score >= 6){
    rank = "Beat Reporter";
    flavor = "Solid work. You've got the big stories down — now dig into the details.";
  } else if(score >= 4){
    rank = "Weekend Skimmer";
    flavor = "You caught the headlines between coffee refills. Tomorrow's edition awaits.";
  } else {
    rank = "Crossword-First Reader";
    flavor = "Hey, the puzzles are a legitimate reason to buy the paper. Come back tomorrow and redeem yourself.";
  }
  document.getElementById("rank").textContent = rank;
  document.getElementById("flavor").textContent = flavor;

  const shareBtn = document.getElementById("shareBtn");
  const shareText = "I scored " + score + "/10 on today's 10Everyday.com news quiz \u2014 rank: " + rank + ". Think you can beat me? https://10everyday.com";
  shareBtn.onclick = async () => {
    if (navigator.share) {
      try { await navigator.share({ text: shareText }); } catch(e) {}
    } else {
      try {
        await navigator.clipboard.writeText(shareText);
        shareBtn.textContent = "Copied! Paste it anywhere";
        setTimeout(()=>{ shareBtn.textContent = "Share My Score"; }, 2500);
      } catch(e) {
        prompt("Copy your score:", shareText);
      }
    }
  };
}

render();
</script>

</body>
</html>
